<!doctype html>

<!--
    O CONTEÚDO DESTA PÁGINA FOI TOTALMENTE CRIADO POR INTELIGÊNCIA ARTIFICIAL
-->

<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <title>Erro 404 - Perdido na Arena</title>
        <style type="text/css">
            body {
                background-color: #222;
                color: white;
                font-family: Arial, sans-serif;
                text-align: center;
                margin-top: 20px;
                overflow: hidden;
            }
            canvas {
                background-color: #333;
                border: 3px solid white;
                margin: 10px auto;
                box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
            }
            .menu {
                margin-top: 15px;
            }
            button {
                padding: 10px 20px;
                font-size: 16px;
                margin: 5px;
                cursor: pointer;
                background-color: white;
                border: 1px solid black;
                font-weight: bold;
                transition: 0.2s;
            }
            button:hover {
                background-color: #ddd;
                transform: scale(1.05);
            }
            p.dica {
                color: #aaa;
                font-size: 14px;
            }
        </style>
    </head>
    <body>
        <h1>Erro 404</h1>
        <p>Ops! Parece que essa página foi destruída pelas bombas...</p>

        <canvas></canvas>

        <div class="menu">
            <p class="dica">
                Dica: Use <b>W</b> e <b>S</b> para brincar com a gravidade enquanto estiver perdido.
            </p>
            <button onclick="window.location.href = '/'">Voltar para a Segurança (Início)</button>
        </div>

        <script>
            var canvas = document.querySelector('canvas')
            canvas.width = 800
            canvas.height = 400
            var c = canvas.getContext('2d')

            var listaBombas = []
            var frames = 0

            var py = 50
            var vy = 0
            var gravidade = 0.5

            var teclas = {}
            window.addEventListener('keydown', function (event) {
                teclas[event.key] = true
            })
            window.addEventListener('keyup', function (event) {
                teclas[event.key] = false
            })

            function animate() {
                requestAnimationFrame(animate)

                c.fillStyle = '#333'
                c.fillRect(0, 0, canvas.width, canvas.height)

                c.fillStyle = 'rgba(255, 255, 255, 0.05)'
                c.font = 'bold 250px Arial'
                c.textAlign = 'center'
                c.textBaseline = 'middle'
                c.fillText('404', 400, 200)

                c.fillStyle = 'orange'
                c.beginPath()
                c.arc(400, 200, 25, 0, Math.PI * 2)
                c.fill()

                frames++

                if (frames % 40 == 0) {
                    var angulo = Math.random() * Math.PI * 2
                    var velocidade = 1.5 + Math.random() * 2

                    listaBombas.push({
                        x: 394,
                        y: 194,
                        vx: Math.cos(angulo) * velocidade,
                        vy: Math.sin(angulo) * velocidade,
                    })
                }

                c.fillStyle = 'yellow'
                for (var i = listaBombas.length - 1; i >= 0; i--) {
                    var b = listaBombas[i]
                    b.x += b.vx
                    b.y += b.vy
                    c.fillRect(b.x, b.y, 12, 12)

                    if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                        listaBombas.splice(i, 1)
                    }
                }

                if (teclas['w'] || teclas['W']) gravidade = -0.5
                else if (teclas['s'] || teclas['S']) gravidade = 0.5

                vy += gravidade
                py += vy

                if (py + 25 >= canvas.height) {
                    py = canvas.height - 25
                    vy *= -0.7
                } else if (py <= 0) {
                    py = 0
                    vy *= -0.7
                }

                c.fillStyle = 'red'
                c.fillRect(150, py, 25, 25)
            }

            animate()
        </script>
    </body>
</html>
